services:
  - type: web
    name: sync-fm
    runtime: node
    # Run from the root directory to use the root package.json
    rootDir: .
    # Render's postinstall in the root handles building everything
    buildCommand: npm install && npm run build
    # Starts the backend, which now serves the frontend dist
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001

